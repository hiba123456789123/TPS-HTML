<!DOCTYPE html>
<html>
<head>
  <style>
    .warning {
      border: 10px ridge #f00;
      background-color: #ff0;
      padding: 0.5rem;
      display: flex;
      flex-direction: column;
    }
    .warning img {
      width: 100%;
    }
    .warning p {
font: small-caps bold 1.2rem sans-serif;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="warning">
    <img src="LEOPARD.JPG", alt="Leopards (Panthera pardus) are one of the world's five surviving big cats, renowned for their incredible strength, opportunistic hunting behavior, and distinctive rosette-shaped spots. They belong to the genus Panthera along with lions, tigers, jaguars, and snow leopards.">
    <p>Beware of the leopard</p>
  </div>
</body>
</html>
